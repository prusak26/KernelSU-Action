name: Patch Boot with KernelSU

on:
  workflow_dispatch:
    inputs:
      boot_url:
        description: "Прямая ссылка на твой boot.img (Google Drive)"
        required: true
        default: "https://docs.google.com/uc?export=download&id=1lMs6TFkuuN-FxXgwpkV6cAPLd71BYVMf"
      ksu_version:
        description: "Версия KernelSU"
        required: true
        default: "v0.9.5"

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install -y cpio curl unzip wget

      - name: Download Boot
        run: |
          # Скрипт для пробития защиты Google Drive на большие файлы
          FILE_ID="1lMs6TFkuuN-FxXgwpkV6cAPLd71BYVMf"
          CONFIRM=$(curl -sc /tmp/gcookie "https://docs.google.com/uc?export=download&id=${FILE_ID}" | grep -o 'name="confirm" value="[^"]*"' | sed 's/.*value="\([^"]*\)".*/\1/')
          curl -Lb /tmp/gcookie "https://docs.google.com/uc?export=download&id=${FILE_ID}&confirm=${CONFIRM}" -o boot.img
          
          # Проверка: если файл меньше 5МБ, значит скачалась ошибка
          if [ $(stat -c%s "boot.img") -lt 5000000 ]; then 
            echo "Ошибка: Файл слишком мал. Проверь, что доступ к файлу открыт для всех!"
            exit 1
          fi

      - name: Download Tools
        run: |
          # Скачиваем magiskboot
          curl -L "https://github.com/magisk-modules/magiskboot-binaries/releases/download/v27.0/magiskboot.zip" -o magiskboot.zip
          unzip -j magiskboot.zip x86_64/magiskboot -d . && chmod +x magiskboot
          
          # Скачиваем ядро KernelSU (версия 4.14 для Samsung A50)
          curl -L "https://github.com/tiann/KernelSU/releases/download/${{ github.event.inputs.ksu_version }}/kernel-arm64-414-release.img" -o ksu_kernel

      - name: Patching Image
        run: |
          # Распаковка
          ./magiskboot unpack boot.img
          if [ ! -f kernel ]; then echo "Ошибка распаковки!"; exit 1; fi
          
          # Замена ядра
          mv ksu_kernel kernel
          
          # Сборка обратно
          ./magiskboot repack boot.img patched_boot.img
          if [ ! -f patched_boot.img ]; then echo "Ошибка сборки!"; exit 1; fi

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: KSU_Patched_Boot_A50
          path: patched_boot.img
