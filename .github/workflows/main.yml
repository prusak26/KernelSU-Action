name: Patch Boot with KernelSU

on:
  workflow_dispatch:
    inputs:
      boot_url:
        description: "Ссылка на boot.img"
        required: true
        default: "https://files.catbox.moe/5ehnij.img"
      ksu_version:
        description: "Версия KernelSU"
        required: true
        default: "v0.9.5"

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cpio curl unzip wget

      - name: Download Boot
        run: |
          # Пробуем wget с подменой браузера и повторами
          wget -U "Mozilla/5.0" --tries=5 --wait=2 -O boot.img "${{ github.event.inputs.boot_url }}"
          
          # Если wget не справился, пробуем curl
          if [ ! -s boot.img ]; then
            curl -L -A "Mozilla/5.0" -o boot.img "${{ github.event.inputs.boot_url }}"
          fi

          # Проверка размера (минимум 5МБ)
          SIZE=$(stat -c%s "boot.img")
          echo "Размер скачанного файла: $SIZE байт"
          if [ $SIZE -lt 5000000 ]; then 
            echo "Ошибка: Файл пустой или слишком мал!"
            exit 1
          fi

      - name: Download Tools
        run: |
          curl -L "https://github.com/magisk-modules/magiskboot-binaries/releases/download/v27.0/magiskboot.zip" -o magiskboot.zip
          unzip -j magiskboot.zip x86_64/magiskboot -d . && chmod +x magiskboot
          curl -L "https://github.com/tiann/KernelSU/releases/download/${{ github.event.inputs.ksu_version }}/kernel-arm64-414-release.img" -o ksu_kernel

      - name: Patching Image
        run: |
          ./magiskboot unpack boot.img
          if [ ! -f kernel ]; then echo "Не удалось распаковать!"; exit 1; fi
          mv -f ksu_kernel kernel
          ./magiskboot repack boot.img patched_boot.img

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: KSU_Patched_Boot_A50
          path: patched_boot.img
