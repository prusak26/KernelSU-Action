- name: Setup Magiskboot & KSU Kernel
        run: |
          # Используем стабильное зеркало для magiskboot (x86_64 для Ubuntu Runner)
          # Если эта ссылка тоже упадет, у нас есть запасной вариант ниже
          curl -f -L "https://github.com/heyandyc/magiskboot-binary/raw/main/magiskboot" -o magiskboot || \
          curl -f -L "https://github.com/punpundesu/magiskboot-bins/raw/main/x86_64/magiskboot" -o magiskboot
          
          chmod +x magiskboot
          
          # Проверка, что файл реально скачался и это исполняемый файл
          if ! file magiskboot | grep -q "ELF"; then
            echo "Ошибка: Скачанный файл magiskboot поврежден или не является бинарником!"
            exit 1
          fi
          
          # Загрузка ядра KernelSU
          KSU_URL="https://github.com/tiann/KernelSU/releases/download/${{ github.event.inputs.ksu_version }}/kernel-arm64-414-release.img"
          if ! curl -f -L "$KSU_URL" -o ksu_kernel; then
            echo "Ошибка скачивания ядра KSU"
            exit 1
          fi
