name: Patch Boot with KernelSU

on:
  workflow_dispatch:
    inputs:
      boot_id:
        description: "ID твоего файла на Google Drive"
        required: true
        default: "1lMs6TFkuuN-FxXgwpkV6cAPLd71BYVMf"
      ksu_version:
        description: "Версия KernelSU (например, v0.9.5)"
        required: true
        default: "v0.9.5"

jobs:
  build:
    name: Patching Boot
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install -y cpio curl unzip python3-pip file
          pip3 install gdown

      - name: Download Boot Image
        run: |
          gdown ${{ github.event.inputs.boot_id }} -O boot.img
          if [ ! -s boot.img ]; then echo "Ошибка: boot.img пустой!"; exit 1; fi

      - name: Setup Magiskboot
        run: |
          # Качаем magiskboot напрямую из проверенного места
          curl -f -L "https://github.com/heyandyc/magiskboot-binary/raw/main/magiskboot" -o magiskboot
          chmod +x magiskboot

      - name: Extract Kernel from KernelSU Release
        run: |
          # Качаем AnyKernel3 архив, потому что в релизах нет голых .img
          KSU_ZIP="AnyKernel3-KernelSU-${{ github.event.inputs.ksu_version }}-kernelsu.zip"
          KSU_URL="https://github.com/tiann/KernelSU/releases/download/${{ github.event.inputs.ksu_version }}/$KSU_ZIP"
          
          echo "Скачиваем: $KSU_URL"
          curl -f -L "$KSU_URL" -o ksu_release.zip
          
          # Распаковываем только само ядро (файл Image)
          unzip -j ksu_release.zip Image -d .
          mv Image ksu_kernel

      - name: Patching Process
        run: |
          # Распаковка оригинального бута
          ./magiskboot unpack boot.img
          
          # Подмена
          mv -f ksu_kernel kernel
          
          # Сборка
          ./magiskboot repack boot.img patched_boot.img
          if [ ! -f patched_boot.img ]; then echo "Ошибка сборки!"; exit 1; fi

      - name: Upload & Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: ksu-patch-${{ github.run_id }}
          body: "Патч для Samsung A50 готов. Версия KSU: ${{ github.event.inputs.ksu_version }}"
          files: patched_boot.img
