name: A50 KSU Patcher
on:
  workflow_dispatch:
    inputs:
      boot_url:
        description: "ПРЯМАЯ ссылка на твой boot.img (например из тг или любого хостинга)"
        required: true
      ksu_version:
        description: "Версия KernelSU"
        default: "v0.9.5"

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Tools
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sudo apt update && sudo apt install -y cpio file
          # Качаем magiskboot ОФИЦИАЛЬНЫМ способом через GitHub CLI
          gh release download v27.0 --repo magisk-modules/magiskboot-binaries --pattern "*x86_64*"
          unzip -o magiskboot.zip x86_64/magiskboot -d .
          mv x86_64/magiskboot . && chmod +x magiskboot

      - name: Download and Extract
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Качаем твой бут по прямой ссылке
          curl -L "${{ github.event.inputs.boot_url }}" -o boot.img
          
          # Качаем AnyKernel3 архив KSU (он всегда есть в релизах)
          gh release download ${{ github.event.inputs.ksu_version }} --repo tiann/KernelSU --pattern "AnyKernel3-KernelSU-*-kernelsu.zip" -O ksu.zip
          
          # Вытаскиваем ядро Image напрямую из архива
          unzip -p ksu.zip Image > ksu_kernel
          if [ ! -s ksu_kernel ]; then echo "Ядро не найдено в архиве!"; exit 1; fi

      - name: Patching
        run: |
          ./magiskboot unpack boot.img
          # Подменяем родное ядро на ядро с поддержкой KSU
          mv -f ksu_kernel kernel
          ./magiskboot repack boot.img patched_boot.img
          if [ ! -f patched_boot.img ]; then echo "Ошибка сборки!"; exit 1; fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: patched-boot-A50
          path: patched_boot.img
