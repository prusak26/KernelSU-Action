name: Patch Boot with KernelSU

on:
  workflow_dispatch:
    inputs:
      boot_url:
        description: "Прямая ссылка на твой boot.img"
        required: true
        default: "https://docs.google.com/uc?export=download&id=1lMs6TFkuuN-FxXgwpkV6cAPLd71BYVMf"
      ksu_version:
        description: "Версия KernelSU"
        required: true
        default: "v0.9.5"

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install -y cpio curl unzip

      - name: Download Boot
        run: |
          curl -L -o boot.img "${{ github.event.inputs.boot_url }}"
          if [ $(stat -c%s "boot.img") -lt 1000000 ]; then echo "Ошибка: Файл слишком мал. Проверь доступ к Google Drive!"; exit 1; fi

      - name: Download Tools
        run: |
          curl -L "https://github.com/magisk-modules/magiskboot-binaries/releases/download/v27.0/magiskboot.zip" -o magiskboot.zip
          unzip -j magiskboot.zip x86_64/magiskboot -d . && chmod +x magiskboot
          curl -L "https://github.com/tiann/KernelSU/releases/download/${{ github.event.inputs.ksu_version }}/kernel-arm64-414-release.img" -o ksu_kernel

      - name: Patching Image
        run: |
          ./magiskboot unpack boot.img
          if [ ! -f kernel ]; then echo "Ошибка распаковки: файл kernel не найден"; exit 1; fi
          mv ksu_kernel kernel
          ./magiskboot repack boot.img patched_boot.img

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: KSU_Patched_Boot_A50
          path: patched_boot.img
