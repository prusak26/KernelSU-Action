name: Patch Boot with KernelSU

on:
  workflow_dispatch:
    inputs:
      boot_url:
        description: "ID файла Google Drive (только буквы и цифры)"
        required: true
        default: "1lMs6TFkuuN-FxXgwpkV6cAPLd71BYVMf"
      ksu_version:
        description: "Версия KernelSU"
        required: true
        default: "v0.9.5"

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install -y cpio curl unzip wget

      - name: Download Boot
        run: |
          # Используем более агрессивный метод вытягивания токена подтверждения
          FILE_ID="${{ github.event.inputs.boot_url }}"
          CONFIRM=$(curl -sc /tmp/gcookie "https://docs.google.com/uc?export=download&id=${FILE_ID}" | sed -rn 's/.*confirm=([0-9A-Za-z_]+).*/\1/p')
          
          # Если CONFIRM пустой (файл мал), качаем напрямую, иначе с токеном
          if [ -z "$CONFIRM" ]; then
            curl -Lc /tmp/gcookie "https://docs.google.com/uc?export=download&id=${FILE_ID}" -o boot.img
          else
            curl -Lb /tmp/gcookie "https://docs.google.com/uc?export=download&id=${FILE_ID}&confirm=${CONFIRM}" -o boot.img
          fi
          
          # Финальная проверка размера (должен быть больше 10МБ)
          if [ $(stat -c%s "boot.img") -lt 10000000 ]; then 
            echo "Ошибка: Скачанный файл подозрительно мал. Попробуй использовать прямую ссылку с Catbox.moe"
            exit 1
          fi

      - name: Download Tools
        run: |
          curl -L "https://github.com/magisk-modules/magiskboot-binaries/releases/download/v27.0/magiskboot.zip" -o magiskboot.zip
          unzip -j magiskboot.zip x86_64/magiskboot -d . && chmod +x magiskboot
          curl -L "https://github.com/tiann/KernelSU/releases/download/${{ github.event.inputs.ksu_version }}/kernel-arm64-414-release.img" -o ksu_kernel

      - name: Patching Image
        run: |
          ./magiskboot unpack boot.img
          if [ ! -f kernel ]; then echo "Ошибка распаковки!"; exit 1; fi
          mv ksu_kernel kernel
          ./magiskboot repack boot.img patched_boot.img

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: KSU_Patched_Boot_A50
          path: patched_boot.img
