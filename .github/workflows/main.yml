name: Patch Boot with KernelSU

on:
  workflow_dispatch:
    inputs:
      boot_id:
        description: "ID твоего файла на Google Drive"
        required: true
        default: "1lMs6TFkuuN-FxXgwpkV6cAPLd71BYVMf"
      ksu_version:
        description: "Версия KernelSU"
        required: true
        default: "v0.9.5"

jobs:
  build:
    name: Patching Boot
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install -y cpio curl unzip python3-pip file
          pip3 install gdown

      - name: Download Boot Image
        run: |
          gdown ${{ github.event.inputs.boot_id }} -O boot.img
          if [ ! -s boot.img ]; then echo "Ошибка: boot.img пустой!"; exit 1; fi

      - name: Setup Magiskboot & KSU Kernel
        run: |
          # Загрузка magiskboot с проверкой
          ASSET_URL="https://github.com/magisk-modules/magiskboot-binaries/releases/download/v27.0/magiskboot.zip"
          
          if ! curl -f -L "$ASSET_URL" -o magiskboot.zip; then
            echo "Ошибка: Не удалось скачать magiskboot (HTTP Error)"
            exit 1
          fi
          
          # Валидация ZIP-архива
          if ! unzip -t magiskboot.zip > /dev/null 2>&1; then
            echo "Ошибка: magiskboot.zip поврежден или не является ZIP-файлом"
            file magiskboot.zip
            exit 1
          fi
          
          # Распаковка и настройка
          unzip -o magiskboot.zip x86_64/magiskboot -d .
          mv x86_64/magiskboot . && chmod +x magiskboot
          
          # Загрузка ядра KernelSU
          KSU_URL="https://github.com/tiann/KernelSU/releases/download/${{ github.event.inputs.ksu_version }}/kernel-arm64-414-release.img"
          if ! curl -f -L "$KSU_URL" -o ksu_kernel; then
            echo "Ошибка скачивания ядра KSU"
            exit 1
          fi

      - name: Patching Process
        run: |
          # Распаковка оригинала
          ./magiskboot unpack boot.img
          if [ ! -f kernel ]; then echo "Ошибка: Не удалось распаковать boot.img!"; exit 1; fi
          
          # Замена ядра
          mv -f ksu_kernel kernel
          
          # Сборка (теперь без опечаток)
          ./magiskboot repack boot.img patched_boot.img
          if [ ! -f patched_boot.img ]; then 
            echo "Ошибка: patched_boot.img не создан!"
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Patched_Boot_A50
          path: patched_boot.img

      - name: Release Patched Boot
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: ksu-${{ github.event.inputs.ksu_version }}-${{ github.run_id }}
          body: |
            KernelSU Patched Boot для Samsung A50.
            Сборка прошла успешно с использованием валидации файлов.
          files: patched_boot.img
