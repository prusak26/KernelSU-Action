name: Patch Boot with KernelSU

on:
  workflow_dispatch:
    inputs:
      boot_url:
        description: "Прямая ссылка на boot.img (например, Catbox)"
        required: true
        default: "https://files.catbox.moe/5ehnij.img"
      ksu_version:
        description: "Версия KernelSU"
        required: true
        default: "v0.9.5"

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install -y cpio curl unzip

      - name: Download Boot
        run: |
          # Просто скачиваем файл по прямой ссылке
          curl -L "${{ github.event.inputs.boot_url }}" -o boot.img
          
          # Проверка: если файл меньше 10МБ, значит что-то пошло не так
          if [ $(stat -c%s "boot.img") -lt 10000000 ]; then 
            echo "Ошибка: Файл не скачался или поврежден!"
            exit 1
          fi

      - name: Download Tools
        run: |
          # Скачиваем magiskboot для разборки образа
          curl -L "https://github.com/magisk-modules/magiskboot-binaries/releases/download/v27.0/magiskboot.zip" -o magiskboot.zip
          unzip -j magiskboot.zip x86_64/magiskboot -d . && chmod +x magiskboot
          
          # Скачиваем официальное ядро KernelSU 4.14
          curl -L "https://github.com/tiann/KernelSU/releases/download/${{ github.event.inputs.ksu_version }}/kernel-arm64-414-release.img" -o ksu_kernel

      - name: Patching Image
        run: |
          # Распаковываем твой boot.img
          ./magiskboot unpack boot.img
          if [ ! -f kernel ]; then echo "Ошибка: Не удалось распаковать boot.img!"; exit 1; fi
          
          # Подменяем ядро на KernelSU
          mv -f ksu_kernel kernel
          
          # Собираем образ обратно
          ./magiskboot repack boot.img patched_boot.img
          if [ ! -f patched_boot.img ]; then echo "Ошибка: Не удалось собрать новый образ!"; exit 1; fі

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: KSU_Patched_Boot_A50
          path: patched_boot.img
