name: Patch Boot with KernelSU

on:
  workflow_dispatch:
    inputs:
      boot_id:
        description: "ID твоего файла на Google Drive"
        required: true
        default: "1lMs6TFkuuN-FxXgwpkV6cAPLd71BYVMf"
      ksu_version:
        description: "Версия KernelSU"
        required: true
        default: "v0.9.5"

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install -y cpio curl unzip python3-pip
          pip3 install gdown

      - name: Download Boot
        run: |
          gdown ${{ github.event.inputs.boot_id }} -O boot.img
          if [ ! -s boot.img ]; then echo "Ошибка: Файл не скачан!"; exit 1; fi

      - name: Patching Process
        run: |
          # Скачиваем и сразу подготавливаем magiskboot
          curl -L "https://github.com/magisk-modules/magiskboot-binaries/releases/download/v27.0/magiskboot.zip" -o magiskboot.zip
          unzip -o magiskboot.zip x86_64/magiskboot && mv x86_64/magiskboot . && chmod +x magiskboot
          
          # Скачиваем ядро KSU
          curl -L "https://github.com/tiann/KernelSU/releases/download/${{ github.event.inputs.ksu_version }}/kernel-arm64-414-release.img" -o ksu_kernel
          
          # Распаковка
          ./magiskboot unpack boot.img
          if [ ! -f kernel ]; then echo "Ошибка: Не удалось распаковать boot.img!"; exit 1; fi
          
          # Замена
          mv -f ksu_kernel kernel
          
          # Сборка
          ./magiskboot repack boot.img patched_boot.img
          if [ ! -f patched_boot.img ]; then echo "Ошибка: patched_boot.img не создан!"; exit 1; fi

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: KSU_Patched_Boot_A50
          path: patched_boot.img
